services:
  - type: web
    name: hiremate
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 80
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: interview_coach
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_SECONDS
        value: 2400
      - key: MISTRAL_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_STT_MODEL
        value: whisper-large-v3-turbo
      - key: SESSION_MAX_QUESTIONS
        value: 20
      - key: INTERVIEW_DEFAULT_QUESTIONS
        value: 10
      - key: RATE_LIMIT_PER_MINUTE
        value: 60
      - key: ADMIN_INVITE_CODE
        sync: false
      - key: ENABLE_TEST_CREDENTIALS
        value: false
